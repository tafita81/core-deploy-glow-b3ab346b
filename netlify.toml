[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# API routes must come before the SPA catch-all
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
